<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque - Kenvue</title>
    <style>
        /* Paleta Kenvue baseada em tons de Turquesa/Teal corporativo */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f0f7f7;
            color: #112222;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            min-height: 100vh;
        }
        /* Topo com o Logo da Marca */
        .brand-header {
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-bottom: 8px;
            margin-top: 10px;
        }
        .brand-logo {
            max-width: 140px;
            height: auto;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(0, 75, 75, 0.08);
            padding: 24px;
            margin-top: 12px;
            border-top: 4px solid #005a5b; /* Detalhe em turquesa escuro */
        }
        h1 {
            font-size: 20px;
            color: #004b4c;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        h2 {
            font-size: 16px;
            color: #005a5b;
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2c4a4a;
            margin-bottom: 6px;
        }
        /* Elementos de Entrada */
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #b2cfcf;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            background-color: #fbfdfd;
            transition: all 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #007a7c;
            box-shadow: 0 0 0 3px rgba(0, 122, 124, 0.15);
            background-color: #ffffff;
        }
        /* Caixa de Resultados da Busca */
        .product-list {
            margin-top: 6px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #b2cfcf;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .product-item {
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            background: none;
            border: none;
            border-bottom: 1px solid #e5f2f2;
            font-size: 15px;
            color: #1f3838;
            cursor: pointer;
            transition: background 0.15s;
        }
        .product-item:last-child {
            border-bottom: none;
        }
        .product-item:hover {
            background-color: #e6f2f2;
            color: #004b4c;
            font-weight: 500;
        }
        /* Seção do Formulário Ativo */
        .form-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5f2f2;
        }
        .product-title {
            font-size: 18px;
            font-weight: 700;
            color: #004b4c;
            margin-bottom: 4px;
        }
        .stock-info {
            font-size: 14px;
            color: #557171;
            margin-bottom: 16px;
        }
        .stock-count {
            font-weight: 700;
            color: #007a7c;
        }
        /* Botão Principal */
        button.btn-primary {
            width: 100%;
            background-color: #007a7c; /* Turquesa da marca */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 2px 6px rgba(0, 122, 124, 0.2);
        }
        button.btn-primary:hover {
            background-color: #005a5b;
        }
        /* Alertas */
        .alert-success {
            margin-top: 16px;
            padding: 12px;
            background-color: #d1f2f2;
            color: #004b4c;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #a3e5e5;
        }
        .hidden {
            display: none !important;
        }
        /* Tabela Inferior de Estoque */
        .stock-table {
            margin-top: 4px;
        }
        .table-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5f2f2;
            font-size: 14px;
            color: #2c4a4a;
        }
        .table-row:last-child {
            border-bottom: none;
        }
        .badge-low {
            color: #c92a2a;
            font-weight: 700;
            background-color: #ffe3e3;
            padding: 2px 8px;
            border-radius: 6px;
        }
        .badge-normal {
            color: #005a5b;
            font-weight: 700;
            background-color: #e6f2f2;
            padding: 2px 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- Logo Kenvue Centrado no Topo -->
    <div class="brand-header">
        <img src="https://wikimedia.org" alt="Kenvue Logo" class="brand-logo">
    </div>

    <!-- Bloco Principal de Movimentação -->
    <div class="container">
        <h1>SISTEMA DE ESTOQUE</h1>
        
        <!-- Campo de Pesquisa -->
        <div style="margin-bottom: 12px;">
            <label for="searchBar">Localizar Material</label>
            <input type="text" id="searchBar" oninput="filterProducts()" placeholder="Digite para buscar...">
            <div id="productList" class="product-list hidden"></div>
        </div>

        <!-- Painel de Confirmação de Retirada -->
        <div id="withdrawalForm" class="hidden form-section">
            <h3 id="selectedProductName" class="product-title"></h3>
            <p class="stock-info">Disponível no armário: <span id="currentStock" class="stock-count">0</span> un</p>
            
            <div style="margin-bottom: 16px;">
                <label for="quantityInput">Quantidade Retirada</label>
                <input type="number" id="quantityInput" min="1" value="1" style="text-align: center; font-size: 20px; font-weight: bold; color: #004b4c;">
            </div>

            <button onclick="confirmWithdrawal()" class="btn-primary">Registrar Retirada</button>
        </div>

        <!-- Feedback de Sucesso -->
        <div id="successMessage" class="alert-success hidden">
            ✓ Estoque atualizado no sistema!
        </div>
    </div>

    <!-- Painel de Consulta do Almoxarifado -->
    <div class="container" style="border-top-color: #007a7c;">
        <h2>📋 Itens Cadastrados</h2>
        <div id="stockTable" class="stock-table"></div>
    </div>

    <script>
        // ==========================================
        // PRODUTOS E QUANTIDADES (PERSONALIZE AQUI)
        // Altere os nomes e estoques padrão conforme sua necessidade
        // ==========================================
        let initialProducts = [
            { id: 1, name: "Álcool em Gel Antisséptico", stock: 24 },
            { id: 2, name: "Luvas de Procedimento (M)", stock: 15 },
            { id: 3, name: "Curativo Band-Aid Caixa c/ 30", stock: 40 },
            { id: 4, name: "Listerine Mentol 500ml", stock: 12 },
            { id: 5, name: "Sabonete Líquido Johnson's", stock: 18 },
            { id: 6, name: "Protetor Solar Neutrogena FPS 50", stock: 8 },
            { id: 7, name: "Papel Toalha Interfolha (Pacote)", stock: 5 }
        ];

        if (!localStorage.getItem('inventory')) {
            localStorage.setItem('inventory', JSON.stringify(initialProducts));
        }

        let products = JSON.parse(localStorage.getItem('inventory'));
        let selectedProduct = null;

        function renderStockTable() {
            const table = document.getElementById('stockTable');
            table.innerHTML = '';
            products.forEach(p => {
                const stockClass = p.stock <= 5 ? 'badge-low' : 'badge-normal';
                table.innerHTML += `
                    <div class="table-row">
                        <span>${p.name}</span>
                        <span class="${stockClass}">${p.stock} un</span>
                    </div>
                `;
            });
        }

        function filterProducts() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const listDiv = document.getElementById('productList');
            listDiv.innerHTML = '';

            if (query.trim() === '') {
                listDiv.classList.add('hidden');
                return;
            }

            const filtered = products.filter(p => p.name.toLowerCase().includes(query));

            if (filtered.length > 0) {
                listDiv.classList.remove('hidden');
                filtered.forEach(p => {
                    listDiv.innerHTML += `
                        <button onclick="selectProduct(${p.id})" class="product-item">
                            ${p.name} (${p.stock} un)
                        </button>
                    `;
                });
